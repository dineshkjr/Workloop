<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1a2340;--navy2:#243055;--teal:#00897b;--teal2:#00bfa5;
  --gold:#f9a825;--cream:#fdf8f0;--cream2:#f5ede0;
  --red:#e53935;--green:#43a047;--orange:#fb8c00;
  --text:#1a2340;--muted:#607d8b;--border:#e0d8cc;
  --white:#fff;--sidebar-w:224px;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:13.5px}
h1,h2,h3,.brand-name{font-family:'Playfair Display',serif}
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:var(--navy);position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 1.5rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.content{padding:1.5rem;flex:1}
.brand{padding:1.25rem 1.25rem 0.875rem;border-bottom:1px solid rgba(255,255,255,0.08)}
.brand-name{color:#fff;font-size:1.3rem}
.brand-tag{color:var(--teal2);font-size:10px;font-weight:400;letter-spacing:0.14em;text-transform:uppercase;margin-top:2px}
.nav-section{padding:0.875rem 0.75rem 0.4rem;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.12em;text-transform:uppercase;font-weight:500}
.nav-item{display:flex;align-items:center;gap:9px;padding:0.55rem 1.25rem;color:rgba(255,255,255,0.58);cursor:pointer;transition:all 0.12s;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.06)}
.nav-item.active{color:#fff;background:rgba(0,191,165,0.14);border-left-color:var(--teal2)}
.nav-item i{width:16px;font-size:13px;text-align:center}
.nav-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:auto}

.page-title{font-size:1rem;font-weight:600;color:var(--navy)}
.topbar-right{display:flex;align-items:center;gap:1rem}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}

.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:0.875rem;margin-bottom:1.25rem}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:1.1rem;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.stat-card.blue::before{background:var(--navy)}
.stat-card.teal::before{background:var(--teal)}
.stat-card.gold::before{background:var(--gold)}
.stat-card.red::before{background:var(--red)}
.stat-card.green::before{background:var(--green)}
.stat-card.orange::before{background:var(--orange)}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;font-weight:600}
.stat-value{font-size:1.75rem;font-weight:600;color:var(--text);line-height:1.2;margin:0.2rem 0}
.stat-sub{font-size:11px;color:var(--muted)}

.card{background:#fff;border-radius:12px;border:1px solid var(--border);padding:1.25rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.section-title{font-size:0.95rem;font-weight:600;color:var(--navy)}

.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--cream2)}
th{padding:0.65rem 0.875rem;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:0.65rem 0.875rem;border-bottom:1px solid #f0ebe3;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fdf5e8}
tfoot td{background:var(--cream2);font-weight:600;border-top:1px solid var(--border)}

.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.badge-green{background:#e8f5e9;color:#1b5e20}
.badge-red{background:#ffebee;color:#b71c1c}
.badge-gold{background:#fff8e1;color:#e65100}
.badge-blue{background:#e3f2fd;color:#0d47a1}
.badge-navy{background:#e8eaf6;color:#1a237e}
.badge-orange{background:#fff3e0;color:#bf360c}
.badge-purple{background:#f3e5f5;color:#4a148c}
.badge-teal{background:#e0f2f1;color:#004d40}

.btn{display:inline-flex;align-items:center;gap:5px;padding:0.5rem 1.1rem;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.12s}
.btn-primary{background:var(--teal);color:#fff}.btn-primary:hover{background:var(--teal2)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy2)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}.btn-outline:hover{border-color:var(--teal);color:var(--teal)}
.btn-danger{background:var(--red);color:#fff}
.btn-warning{background:var(--orange);color:#fff}
.btn-sm{padding:0.3rem 0.75rem;font-size:12px}

.tabs{display:flex;gap:0;border-bottom:2px solid var(--border);margin-bottom:1.25rem}
.tab{padding:0.65rem 1.1rem;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all 0.12s;font-weight:500}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}

.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.875rem}
.form-group{display:flex;flex-direction:column;gap:0.35rem}
.form-group.full{grid-column:1/-1}
label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em}
input,select,textarea{border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.8rem;font-family:inherit;font-size:13px;color:var(--text);background:#fff;outline:none;transition:border 0.12s}
input:focus,select:focus,textarea:focus{border-color:var(--teal)}
textarea{resize:vertical;min-height:70px}

.divider{border:none;border-top:1px solid var(--border);margin:1rem 0}
.pill{display:inline-block;background:var(--cream2);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--muted);border:1px solid var(--border)}
.progress-bar{height:5px;background:var(--cream2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--teal)}
.alert{border-radius:8px;padding:0.75rem 1rem;font-size:13px;margin-bottom:1rem;display:flex;align-items:flex-start;gap:9px}
.alert-info{background:#e3f2fd;color:#0d47a1;border:1px solid #90caf9}
.alert-warn{background:#fff8e1;color:#e65100;border:1px solid #ffcc02}
.alert-danger{background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a}
.alert-success{background:#e8f5e9;color:#1b5e20;border:1px solid #a5d6a7}

.modal-overlay{position:fixed;inset:0;background:rgba(26,35,64,0.55);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;padding:1.75rem;width:580px;max-width:96vw;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.modal-title{font-size:1rem;font-weight:600;color:var(--navy)}
.modal-close{background:none;border:none;font-size:1.1rem;cursor:pointer;color:var(--muted);padding:4px}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:6px;cursor:pointer;font-weight:500}
.cal-day:hover{background:var(--cream2)}
.cal-day.holiday{background:#ffebee;color:#b71c1c}
.cal-day.sunday{background:#f3e5f5;color:#4a148c}
.cal-day.today{background:var(--navy);color:#fff}
.cal-day.other-month{color:var(--muted);opacity:0.4}
.cal-day.leave-cl{background:#e3f2fd;color:#0d47a1}
.cal-day.leave-sl{background:#e8f5e9;color:#1b5e20}
.cal-day.leave-lwp{background:#fff8e1;color:#e65100}
.cal-day.leave-ml{background:#fce4ec;color:#880e4f}

.eff-bar{height:28px;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:#fff;transition:width 0.3s}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

<div class="sidebar">

    <div class="brand-name">Cottony</div>

<div class="main">

  <div class="content" id="content"></div>
</div>
</div>

<div class="modal-overlay hidden" id="modal-overlay">

</div>

});

['Stitching','Hemming','Cutting','Neck Stitching','Button Fixing'].forEach(skill=>{
  state.skillMatrix[skill]=state.contractWorkers.filter(w=>w.skill===skill).slice(0,3).map(w=>w.id);

state.contractWorkers.forEach(w=>{
  const extra=['Hemming','Ironing','Packing','Labelling'].filter(s=>s!==w.skill);
  w.secondarySkills=[extra[Math.floor(Math.random()*extra.length)]];

function getPendingLeaves(){return state.leaveRequests.filter(l=>l.status==='pending').length}
function updateBadge(){const n=getPendingLeaves();document.getElementById('pending-badge').textContent=n;document.getElementById('pending-badge').style.display=n>0?'':'none'}

function navigate(page){

function renderMiniCal(year,month,holMap){
  const first=new Date(year,month,1).getDay();
  const days=new Date(year,month+1,0).getDate();
  let cells='<div class="cal-grid">';
  for(let i=0;i<first;i++) cells+=`<div class="cal-day other-month"></div>`;
  for(let d=1;d<=days;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(year,month,d).getDay();
    const isToday=dateStr===today.toISOString().slice(0,10);
    const isHol=holMap[dateStr];
    const isSun=dow===0;
    let cls='cal-day';
    if(isToday) cls+=' today';
    else if(isHol) cls+=' holiday';
    else if(isSun) cls+=' sunday';
    cells+=`<div class="${cls}" title="${isHol?isHol.name:isSun?'Sunday':''}">${d}</div>`;
  }
  cells+='</div>';
  return cells;
}

function getWorkingDays(year,month){
  let count=0;
  const days=new Date(year,month+1,0).getDate();
  for(let d=1;d<=days;d++){
    const date=new Date(year,month,d);
    const ds=date.toISOString().slice(0,10);
    if(date.getDay()!==0&&!TN_HOLIDAYS_2026.find(h=>h.date===ds)) count++;
  }
  return count;
}
function getHolidaysInMonth(year,month){
  return TN_HOLIDAYS_2026.filter(h=>h.date.startsWith(`${year}-${String(month+1).padStart(2,'0')}`)).length;
}

  if(tb) tb.innerHTML=conRows(state.contractWorkers.filter(w=>(!q||w.name.toLowerCase().includes(q))&&(!sk||w.skill===sk)));
}

function addCon(){
  showModal(`<div class="modal-header"><div class="modal-title">Add Contract Worker</div><button class="modal-close" onclick="closeModal()"><i class="fa fa-times"></i></button></div>
  <div class="form-grid">
    <div class="form-group"><label>Full Name</label><input type="text" id="cw-n"></div>
    <div class="form-group"><label>Primary Skill</label><select id="cw-sk">${Object.keys(state.pieceRates).map(s=>`<option>${s}</option>`).join('')}</select></div>
    <div class="form-group"><label>Phone</label><input type="tel" id="cw-ph"></div>
    <div class="form-group"><label>Gender</label><select id="cw-gen"><option value="F">Female</option><option value="M">Male</option></select></div>
  </div>
  <div style="margin-top:1.25rem;display:flex;gap:0.75rem;justify-content:flex-end">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveCon()"><i class="fa fa-save"></i> Save</button>
  </div>`);
}

function saveCon(){
  const name=document.getElementById('cw-n').value.trim();
  const phone=document.getElementById('cw-ph').value.trim();
  if(!name||!phone){alert('Fill required fields');return;}
  const id='C'+String(state.contractWorkers.length+1).padStart(3,'0');
  state.contractWorkers.push({id,name,skill:document.getElementById('cw-sk').value,phone,gender:document.getElementById('cw-gen').value,status:'active',secondarySkills:[]});
  closeModal();navigate('contract');
}

function renderPieceRate(){
  return`
<div style="display:grid;grid-template-columns:280px 1fr;gap:1rem">
  <div>
    <div class="card">
      <div class="section-title" style="margin-bottom:1rem">Rate Settings (₹/unit)</div>
      ${Object.entries(state.pieceRates).map(([a,r])=>`
        <div style="display:flex;align-items:center;justify-content:space-between;padding:0.55rem 0;border-bottom:1px solid var(--border)">
          <span style="font-weight:500;font-size:13px">${a}</span>
          <input type="number" step="0.1" min="0" value="${r}" style="width:75px;text-align:right" onchange="state.pieceRates['${a}']=parseFloat(this.value)||0">
        </div>`).join('')}
      <div style="margin-top:1rem;display:flex;gap:0.5rem">
        <input type="text" id="na" placeholder="New action" style="flex:1">
        <input type="number" id="nr" placeholder="₹" step="0.1" style="width:65px">
        <button class="btn btn-primary btn-sm" onclick="addAct()"><i class="fa fa-plus"></i></button>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="section-header">
      <div class="section-title">Bulk Entry — ${today.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
      <div style="display:flex;gap:0.5rem">
        <select id="bsk"><option value="">All skills</option>${Object.keys(state.pieceRates).map(s=>`<option>${s}</option>`).join('')}</select>
        <button class="btn btn-outline btn-sm" onclick="filterBulk2()"><i class="fa fa-filter"></i></button>
        <button class="btn btn-primary btn-sm" onclick="saveBulk()"><i class="fa fa-save"></i> Save All</button>
      </div>
    </div>
    <div class="table-wrap" style="max-height:480px;overflow-y:auto">
    <table>
      <thead><tr><th>Worker</th><th>Skill</th><th>Rate</th><th>Units Today</th><th>Today Earn</th></tr></thead>
      <tbody id="bktb">
      ${state.contractWorkers.map(w=>`<tr>
        <td style="font-weight:500;font-size:12px">${w.name}</td>
        <td><span class="badge badge-blue" style="font-size:9px">${w.skill}</span></td>
        <td style="font-size:12px">₹${state.pieceRates[w.skill]||0}</td>
        <td><input type="number" min="0" placeholder="0" id="bk-${w.id}" style="width:70px;text-align:center" oninput="calcEarn('${w.id}')"></td>
        <td style="font-size:12px;color:var(--teal);font-weight:600" id="earn-${w.id}">—</td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>
  </div>
</div>`;
}

function calcEarn(wid){
  const w=state.contractWorkers.find(x=>x.id===wid);if(!w)return;
  const qty=parseInt(document.getElementById(`bk-${wid}`).value)||0;
  const earn=Math.round(qty*(state.pieceRates[w.skill]||0));
  const el=document.getElementById(`earn-${wid}`);
  if(el) el.textContent=qty>0?'₹'+earn.toLocaleString():'—';
}

function addAct(){
  const n=document.getElementById('na').value.trim();
  const r=parseFloat(document.getElementById('nr').value)||0;
  if(!n||!r){alert('Enter name and rate');return;}
  state.pieceRates[n]=r;navigate('piecerate');
}

function filterBulk2(){
  const sk=document.getElementById('bsk').value;
  const tb=document.getElementById('bktb');if(!tb)return;
  const filtered=sk?state.contractWorkers.filter(w=>w.skill===sk):state.contractWorkers;
  tb.innerHTML=filtered.map(w=>`<tr><td style="font-weight:500;font-size:12px">${w.name}</td><td><span class="badge badge-blue" style="font-size:9px">${w.skill}</span></td><td style="font-size:12px">₹${state.pieceRates[w.skill]||0}</td><td><input type="number" min="0" placeholder="0" id="bk-${w.id}" style="width:70px;text-align:center" oninput="calcEarn('${w.id}')"></td><td style="font-size:12px;color:var(--teal);font-weight:600" id="earn-${w.id}">—</td></tr>`).join('');
}

function saveBulk(){
  let n=0;
  state.contractWorkers.forEach(w=>{const el=document.getElementById(`bk-${w.id}`);if(el&&parseInt(el.value)>0){state.pieceEntries[`${w.id}-${thisMonth}`]=(state.pieceEntries[`${w.id}-${thisMonth}`]||0)+parseInt(el.value);n++;}});
  alert(`Saved entries for ${n} workers`);navigate('piecerate');
}

function renderPayroll(){
  const wd=getWorkingDays(2026,5);
  const empPay=state.employees.map(e=>{
    const days=state.attendance[`${e.id}-${thisMonth}`]||wd;
    const basic=Math.round(e.salary/wd*days);
    const pf=Math.round(basic*0.12);
    const net=basic-pf;
    return{...e,days,basic,pf,net};
  });
  const conPay=state.contractWorkers.map(w=>{
    const qty=state.pieceEntries[`${w.id}-${thisMonth}`]||0;
    const gross=Math.round(qty*(state.pieceRates[w.skill]||0));
    const topup=Math.max(0,state.minWageTN-gross);
    return{...w,qty,gross,topup,total:gross+topup};
  });
  const staffNet=empPay.reduce((s,e)=>s+e.net,0);
  const conTotal=conPay.reduce((s,w)=>s+w.total,0);
  const topupTotal=conPay.reduce((s,w)=>s+w.topup,0);

  return`
<div style="background:var(--navy);color:#fff;border-radius:12px;padding:1.25rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.25rem">
  <div><div style="font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase">Month</div><div style="font-size:1rem;font-weight:600;margin-top:3px">${thisMonthName}</div></div>
  <div><div style="font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase">Staff Net</div><div style="font-size:1.2rem;font-weight:700;color:var(--teal2);margin-top:3px">₹${staffNet.toLocaleString()}</div></div>
  <div><div style="font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase">Piece Pay + Topup</div><div style="font-size:1.2rem;font-weight:700;color:var(--gold);margin-top:3px">₹${conTotal.toLocaleString()}</div></div>
  <div><div style="font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase">Grand Total</div><div style="font-size:1.2rem;font-weight:700;margin-top:3px">₹${(staffNet+conTotal).toLocaleString()}</div></div>
</div>
${topupTotal>0?`<div class="alert alert-warn"><i class="fa fa-triangle-exclamation"></i> ₹${topupTotal.toLocaleString()} minimum wage topup added to ${conPay.filter(w=>w.topup>0).length} contract workers this month.</div>`:''}
<div class="tabs">
  <div class="tab active" onclick="swPay(this,'py-staff','py-con')">Staff Salaries</div>
  <div class="tab" onclick="swPay(this,'py-con','py-staff')">Contract Payout</div>
</div>
<div id="py-staff">
  <div class="table-wrap">
  <table>
    <thead><tr><th>Name</th><th>Dept</th><th>Days</th><th>Basic (₹)</th><th>PF -12%</th><th>Net Pay</th><th>Slip</th></tr></thead>
    <tbody>
    ${empPay.map(e=>`<tr>
      <td style="font-weight:500">${e.name}</td><td>${e.dept}</td>
      <td style="text-align:center">${e.days}/${wd}</td>
      <td>₹${e.basic.toLocaleString()}</td>
      <td style="color:var(--red)">-₹${e.pf.toLocaleString()}</td>
      <td style="font-weight:700;color:var(--teal)">₹${e.net.toLocaleString()}</td>
      <td><button class="btn btn-outline btn-sm" onclick="slip('${e.id}')"><i class="fa fa-receipt"></i></button></td>
    </tr>`).join('')}
    </tbody>
    <tfoot><tr><td colspan="5" style="text-align:right">Total:</td><td style="color:var(--teal);font-weight:700">₹${staffNet.toLocaleString()}</td><td></td></tr></tfoot>
  </table>
  </div>
</div>
<div id="py-con" class="hidden">
  <div class="table-wrap">
  <table>
    <thead><tr><th>Name</th><th>Skill</th><th>Units</th><th>Piece Pay</th><th>Min Wage Topup</th><th>Total Pay</th></tr></thead>
    <tbody>
    ${conPay.map(w=>`<tr>
      <td style="font-weight:500">${w.name}</td>
      <td><span class="badge badge-blue">${w.skill}</span></td>
      <td>${w.qty}</td>
      <td>₹${w.gross.toLocaleString()}</td>
      <td>${w.topup>0?`<span style="color:var(--orange);font-weight:600">+₹${w.topup.toLocaleString()}</span>`:'—'}</td>
      <td style="font-weight:700;color:${w.topup>0?'var(--orange)':'var(--teal)'}">₹${w.total.toLocaleString()}</td>
    </tr>`).join('')}
    </tbody>
    <tfoot><tr><td colspan="5" style="text-align:right">Total:</td><td style="color:var(--teal);font-weight:700">₹${conTotal.toLocaleString()}</td></tr></tfoot>
  </table>
  </div>
</div>`;
}

function swPay(el,show,hide){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  document.getElementById(show).classList.remove('hidden');
  document.getElementById(hide).classList.add('hidden');
}

function slip(id){
  const e=state.employees.find(x=>x.id===id);if(!e)return;
  const wd=getWorkingDays(2026,5);
  const days=state.attendance[`${e.id}-${thisMonth}`]||wd;
  const basic=Math.round(e.salary/wd*days);
  const pf=Math.round(basic*0.12);
  const net=basic-pf;
  showModal(`<div class="modal-header"><div class="modal-title">Payslip — ${thisMonthName}</div><button class="modal-close" onclick="closeModal()"><i class="fa fa-times"></i></button></div>
  <div style="border:2px solid var(--border);border-radius:10px;padding:1.25rem">
    <div style="display:flex;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:2px solid var(--navy)">
      <div><div style="font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--navy)">Cottony Textiles</div><div style="font-size:11px;color:var(--muted)">Tirupur, Tamil Nadu</div></div>
      <div style="text-align:right"><div style="font-size:11px;color:var(--muted)">Payslip</div><div style="font-weight:700">${thisMonthName}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;margin-bottom:1rem;font-size:13px">
      <div><span style="color:var(--muted)">Name:</span> <strong>${e.name}</strong></div>
      <div><span style="color:var(--muted)">ID:</span> ${e.id}</div>
      <div><span style="color:var(--muted)">Dept:</span> ${e.dept}</div>
      <div><span style="color:var(--muted)">Days worked:</span> ${days}/${wd}</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
      <div><div style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem">Earnings</div>
        <div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border);font-size:13px"><span>Basic (${days}d)</span><span>₹${basic.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;padding:0.35rem 0;font-size:12px;color:var(--muted)"><span>HRA (20%)</span><span>₹${Math.round(basic*0.2).toLocaleString()}</span></div>
      </div>
      <div><div style="font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:0.5rem">Deductions</div>
        <div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--red)"><span>PF 12%</span><span>-₹${pf.toLocaleString()}</span></div>
        <div style="display:flex;justify-content:space-between;padding:0.35rem 0;font-size:12px;color:var(--muted)"><span>ESI</span><span>₹0</span></div>
      </div>
    </div>
    <div style="background:var(--navy);color:#fff;border-radius:8px;padding:1rem;margin-top:1rem;display:flex;justify-content:space-between">
      <span style="color:rgba(255,255,255,0.6)">Net Pay</span>
      <span style="font-size:1.3rem;font-weight:700;color:var(--teal2)">₹${net.toLocaleString()}</span>
    </div>
  </div>`);
}

function renderReports(){
  const skillTotal={};
  state.contractWorkers.forEach(w=>{const earn=Math.round((state.pieceEntries[`${w.id}-${thisMonth}`]||0)*(state.pieceRates[w.skill]||0));skillTotal[w.skill]=(skillTotal[w.skill]||0)+earn;});
  const maxSk=Math.max(...Object.values(skillTotal));
  const lineEffs=PRODUCTION_LINES.map(l=>{const d=state.productionData[l];const t=d.reduce((s,x)=>s+x.target,0);const a=d.reduce((s,x)=>s+x.actual,0);return{line:l,eff:Math.round(a/t*100)};});
  const defects=PRODUCTION_LINES.map(l=>{const d=state.productionData[l];return{line:l,total:d.reduce((s,x)=>s+x.defects,0)};});
  return`
<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
  <div class="card">
    <div class="section-title" style="margin-bottom:1rem">Piece Pay by Skill — ${thisMonthName}</div>
    ${Object.entries(skillTotal).sort((a,b)=>b[1]-a[1]).map(([s,v],i)=>{const cols=['var(--navy)','var(--teal)','var(--gold)','var(--red)','#7b1fa2','#1565c0','#2e7d32','#bf360c'];return`<div style="margin-bottom:0.75rem"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:500">${s}</span><span style="font-weight:700;color:var(--teal)">₹${v.toLocaleString()}</span></div><div class="progress-bar"><div style="height:100%;border-radius:3px;background:${cols[i%cols.length]};width:${Math.round(v/maxSk*100)}%"></div></div></div>`;}).join('')}
  </div>
  <div class="card">
    <div class="section-title" style="margin-bottom:1rem">Line Efficiency — Weekly Average</div>
    ${lineEffs.map(({line,eff})=>{const col=eff>=90?'var(--green)':eff>=70?'var(--orange)':'var(--red)';return`<div style="margin-bottom:0.875rem"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span style="font-weight:500">${line.split('–')[0]}</span><span style="font-weight:700;color:${col}">${eff}%</span></div><div class="progress-bar"><div style="height:100%;border-radius:3px;background:${col};width:${eff}%"></div></div></div>`;}).join('')}
    <div style="margin-top:1rem"><div class="section-title" style="font-size:12px;margin-bottom:0.5rem">Defect Count — This Week</div>${defects.map(({line,total})=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span>${line.split('–')[0]}</span><span style="font-weight:600;color:${total>50?'var(--red)':total>25?'var(--orange)':'var(--green)'}">${total} pcs</span></div>`).join('')}</div>
  </div>
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:1rem">
  <div class="card"><div class="section-title" style="margin-bottom:0.75rem">Leave Summary</div>
    ${['CL','SL','EL','ML','LWP'].map(t=>{const used=state.leaveRequests.filter(l=>l.type===t&&l.status==='approved').length;return`<div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border);font-size:13px"><span>${LEAVE_TYPES[t].label}</span><span class="badge ${LEAVE_TYPES[t].color}">${used} used</span></div>`;}).join('')}
  </div>
  <div class="card"><div class="section-title" style="margin-bottom:0.75rem">Attendance Summary</div>
    ${(()=>{const wd=getWorkingDays(2026,5);const full=state.employees.filter(e=>(state.attendance[`${e.id}-${thisMonth}`]||wd)>=wd-1).length;const low=state.employees.filter(e=>(state.attendance[`${e.id}-${thisMonth}`]||wd)<wd-5).length;return`<div style="font-size:13.5px;display:flex;flex-direction:column;gap:0.4rem"><div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Full attendance</span><span class="badge badge-green">${full}</span></div><div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Low attendance</span><span class="badge badge-red">${low}</span></div><div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Holidays this month</span><span>${getHolidaysInMonth(2026,5)}</span></div><div style="display:flex;justify-content:space-between;padding:0.35rem 0"><span style="color:var(--muted)">Working days</span><span>${wd}</span></div></div>`;})()}
  </div>
  <div class="card"><div class="section-title" style="margin-bottom:0.75rem">Payroll Summary</div>
    ${(()=>{const wd=getWorkingDays(2026,5);const staffNet=state.employees.reduce((s,e)=>{const days=state.attendance[`${e.id}-${thisMonth}`]||wd;const basic=Math.round(e.salary/wd*days);return s+basic-Math.round(basic*0.12);},0);const conTotal=state.contractWorkers.reduce((s,w)=>s+Math.max(state.minWageTN,Math.round((state.pieceEntries[`${w.id}-${thisMonth}`]||0)*(state.pieceRates[w.skill]||0))),0);return`<div style="font-size:13.5px;display:flex;flex-direction:column;gap:0.4rem"><div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Staff net pay</span><span style="font-weight:600;color:var(--teal)">₹${staffNet.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;padding:0.35rem 0;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">Contract payout</span><span style="font-weight:600;color:var(--gold)">₹${conTotal.toLocaleString()}</span></div><div style="display:flex;justify-content:space-between;padding:0.35rem 0"><span style="color:var(--muted)">Grand total</span><span style="font-weight:700;color:var(--navy)">₹${(staffNet+conTotal).toLocaleString()}</span></div></div>`;})()}
  </div>
</div>`;
}

function switchTab2(el,...ids){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ids.forEach((id,i)=>document.getElementById(id)&&document.getElementById(id).classList.toggle('hidden',i!==0));
}

function showModal(html){document.getElementById('modal-body').innerHTML=html;document.getElementById('modal-overlay').classList.remove('hidden');}
function closeModal(){document.getElementById('modal-overlay').classList.add('hidden');document.getElementById('modal-body').innerHTML='';}
document.getElementById('modal-overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

navigate('dashboard');
updateBadge();
</script>
